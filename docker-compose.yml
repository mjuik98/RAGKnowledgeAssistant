services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      APP_ENV: docker
      DENSE_BACKEND: hash

  demo:
    build: .
    command: streamlit run ui/streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      RAG_API_BASE_URL: http://api:8000
    depends_on:
      - api
